<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1f6feb">
  <meta name="description" content="适合镇江初中英语培训课后使用的家长反馈生成工具">
  <link rel="manifest" href="manifest.webmanifest">
  <title>初中英语课后反馈生成器</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --ink: #202633;
      --muted: #667085;
      --line: #dce3ec;
      --brand: #1f6feb;
      --brand-dark: #1557bd;
      --soft: #edf5ff;
      --soft-2: #f3f7fb;
      --green: #16805a;
      --red: #b42318;
      --shadow: 0 14px 36px rgba(31, 41, 55, .08);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(180deg, #eef5ff 0, var(--bg) 340px);
    }

    button, input, select, textarea { font: inherit; }

    button { -webkit-tap-highlight-color: transparent; }

    .app {
      max-width: 1320px;
      margin: 0 auto;
      padding: 26px 18px 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 7px;
      font-size: clamp(26px, 4vw, 38px);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .top-actions, .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(620px, 1.08fr) minmax(420px, .92fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 17px 19px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .panel-body {
      padding: 18px 19px 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .grid.two { grid-template-columns: repeat(2, 1fr); }

    .field { margin-bottom: 16px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: #fff;
      padding: 10px 12px;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }

    textarea {
      min-height: 82px;
      line-height: 1.65;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(31, 111, 235, .13);
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      min-height: 40px;
      padding: 9px 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background .18s, border-color .18s, transform .18s;
    }

    .btn:hover {
      background: #f8fafc;
      border-color: #c6d0dd;
    }

    .btn:active { transform: translateY(1px); }

    .btn.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      font-weight: 700;
    }

    .btn.primary:hover {
      background: var(--brand-dark);
      border-color: var(--brand-dark);
    }

    .btn.subtle { color: var(--muted); }

    .count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .templates {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 9px;
      margin-bottom: 16px;
    }

    .template {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 11px;
      min-height: 76px;
      cursor: pointer;
      text-align: left;
    }

    .template strong {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .template span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .template.active {
      background: var(--soft);
      border-color: #8bb7ff;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 18px 0 10px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .section-title h3 {
      margin: 0;
      font-size: 16px;
    }

    .knowledge-board {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .knowledge-group {
      border: 1px solid var(--line);
      background: var(--soft-2);
      border-radius: 8px;
      padding: 12px;
    }

    .knowledge-group h4 {
      margin: 0 0 9px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .knowledge-group h4 span {
      color: var(--muted);
      font-weight: 400;
      font-size: 12px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: #fff;
      color: #344054;
      border-radius: 999px;
      padding: 7px 10px;
      min-height: 34px;
      cursor: pointer;
      line-height: 1.25;
      transition: background .18s, border-color .18s, color .18s;
    }

    .chip[aria-pressed="true"] {
      background: var(--soft);
      border-color: #7dafef;
      color: #174ea6;
      font-weight: 700;
    }

    .quick-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .result {
      width: 100%;
      min-height: 610px;
      border: 0;
      background: #fbfcff;
      padding: 18px;
      line-height: 1.9;
      font-size: 16px;
      resize: vertical;
    }

    .notice {
      display: none;
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid #b8ead0;
      border-radius: 8px;
      background: #eefbf4;
      color: var(--green);
      font-weight: 700;
    }

    .notice.show { display: block; }

    .small {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 13px;
    }

    @media (max-width: 1080px) {
      header { grid-template-columns: 1fr; }
      .top-actions { justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      body { background: #f6f8fb; }
      .app { padding: 14px 10px 90px; }
      h1 { font-size: 24px; }
      .subtitle { font-size: 14px; }
      header { margin-bottom: 12px; }
      .panel-head, .panel-body { padding-left: 14px; padding-right: 14px; }
      .grid, .grid.two, .templates, .knowledge-board { grid-template-columns: 1fr; }
      .actions, .top-actions { justify-content: stretch; }
      .top-actions {
        position: sticky;
        top: 0;
        z-index: 4;
        padding: 8px 0;
        background: rgba(246, 248, 251, .94);
        backdrop-filter: blur(10px);
      }
      .btn {
        width: 100%;
        min-height: 46px;
      }
      .chip {
        min-height: 38px;
        padding: 9px 12px;
      }
      input, select, textarea {
        min-height: 44px;
        font-size: 16px;
      }
      .result { min-height: 440px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>初中英语课后反馈生成器</h1>
        <p class="subtitle">按初一、初二、初三自动匹配英语知识点，勾选课堂内容、能力表现和薄弱点，一键生成可发给家长的反馈。</p>
      </div>
      <div class="top-actions">
        <button class="btn subtle" id="resetBtn" type="button">清空</button>
        <button class="btn primary" id="generateTopBtn" type="button">生成反馈</button>
      </div>
    </header>

    <section class="layout">
      <form class="panel" id="feedbackForm">
        <div class="panel-head">
          <h2>课堂勾选</h2>
          <span class="count" id="filledCount">0 项已选择</span>
        </div>
        <div class="panel-body">
          <div class="templates" id="templates">
            <button class="template active" type="button" data-template="sync">
              <strong>校内同步</strong>
              <span>单元知识、课本重难点、作业订正</span>
            </button>
            <button class="template" type="button" data-template="grammar">
              <strong>语法专项</strong>
              <span>结构辨析、例句输出、题型训练</span>
            </button>
            <button class="template" type="button" data-template="reading">
              <strong>阅读专项</strong>
              <span>细节定位、推断概括、长难句</span>
            </button>
            <button class="template" type="button" data-template="exam">
              <strong>试卷讲评</strong>
              <span>错因归类、答题习惯、同类迁移</span>
            </button>
            <button class="template" type="button" data-template="writing">
              <strong>作文专项</strong>
              <span>审题、结构、句式升级、润色</span>
            </button>
          </div>

          <div class="grid">
            <div class="field">
              <label for="student">学生姓名</label>
              <input id="student" name="student" placeholder="如：王">
            </div>
            <div class="field">
              <label for="grade">年级</label>
              <select id="grade" name="grade">
                <option value="g7">初一</option>
                <option value="g8" selected>初二</option>
                <option value="g9">初三</option>
              </select>
            </div>
            <div class="field">
              <label for="tone">反馈语气</label>
              <select id="tone" name="tone">
                <option value="warm" selected>温和鼓励</option>
                <option value="direct">清晰客观</option>
                <option value="strict">严格督促</option>
              </select>
            </div>
            <div class="field">
              <label for="style">话术样式</label>
              <select id="style" name="style">
                <option value="daily" selected>日常沟通</option>
                <option value="progress">突出进步</option>
                <option value="problem">问题诊断</option>
                <option value="exam">提分导向</option>
                <option value="habit">习惯督促</option>
                <option value="brief">简洁专业</option>
              </select>
            </div>
          </div>

          <div class="grid">
            <div class="field">
              <label for="learningStage">学生状态</label>
              <select id="learningStage" name="learningStage">
                <option value="steady" selected>稳步提升</option>
                <option value="foundation">基础薄弱</option>
                <option value="active">课堂积极</option>
                <option value="passive">主动性不足</option>
                <option value="sprint">冲刺提分</option>
              </select>
            </div>
            <div class="field">
              <label for="accuracy">课堂完成度</label>
              <select id="accuracy" name="accuracy">
                <option value="normal" selected>基本完成</option>
                <option value="high">完成较好</option>
                <option value="unstable">正确率不稳</option>
                <option value="low">完成吃力</option>
              </select>
            </div>
            <div class="field">
              <label for="homeSupport">家长配合点</label>
              <select id="homeSupport" name="homeSupport">
                <option value="review" selected>督促复习订正</option>
                <option value="dictation">检查背默</option>
                <option value="reading">监督朗读阅读</option>
                <option value="timing">关注限时训练</option>
                <option value="independent">培养独立完成</option>
              </select>
            </div>
            <div class="field">
              <label for="length">篇幅</label>
              <select id="length" name="length">
                <option value="short">简短</option>
                <option value="medium" selected>标准</option>
                <option value="long">详细</option>
              </select>
            </div>
          </div>

          <div class="section-title">
            <h3>一键课堂场景</h3>
          </div>
          <div class="chips" id="presetBoard">
            <button class="chip" type="button" data-preset="dictation">默写有进步</button>
            <button class="chip" type="button" data-preset="grammarWeak">语法易混</button>
            <button class="chip" type="button" data-preset="readingSlow">阅读卡壳</button>
            <button class="chip" type="button" data-preset="writingUpgrade">作文升级</button>
            <button class="chip" type="button" data-preset="examSprint">考前提分</button>
            <button class="chip" type="button" data-preset="habit">习惯督促</button>
          </div>

          <div class="section-title">
            <h3>分阶段知识点</h3>
            <div class="quick-row">
              <button class="btn subtle" id="clearKnowledgeBtn" type="button">清空知识点</button>
              <button class="btn subtle" id="suggestBtn" type="button">推荐本阶段常用项</button>
            </div>
          </div>
          <div class="knowledge-board" id="knowledgeBoard"></div>

          <div class="section-title">
            <h3>课堂表现与掌握情况</h3>
          </div>
          <div class="grid two">
            <div class="field">
              <label>课堂表现</label>
              <div class="chips" data-field="performance">
                <button class="chip" type="button">听课认真</button>
                <button class="chip" type="button">能主动回答问题</button>
                <button class="chip" type="button">课堂互动积极</button>
                <button class="chip" type="button">做笔记较规范</button>
                <button class="chip" type="button">注意力偶有分散</button>
                <button class="chip" type="button">需要更多主动性</button>
              </div>
            </div>
            <div class="field">
              <label>掌握情况</label>
              <div class="chips" data-field="mastery">
                <button class="chip" type="button">基础概念已理解</button>
                <button class="chip" type="button">能跟上课堂节奏</button>
                <button class="chip" type="button">做题思路有进步</button>
                <button class="chip" type="button">能够口头复述方法</button>
                <button class="chip" type="button">细节运用还需巩固</button>
                <button class="chip" type="button">独立完成不够稳定</button>
              </div>
            </div>
          </div>

          <div class="section-title">
            <h3>薄弱点与课后安排</h3>
          </div>
          <div class="grid two">
            <div class="field">
              <label>主要问题</label>
              <div class="chips" data-field="problems">
                <button class="chip" type="button">单词拼写不够牢</button>
                <button class="chip" type="button">语法概念易混淆</button>
                <button class="chip" type="button">阅读定位偏慢</button>
                <button class="chip" type="button">长难句理解吃力</button>
                <button class="chip" type="button">作文句式较单一</button>
                <button class="chip" type="button">审题不够细致</button>
                <button class="chip" type="button">错题订正不够深入</button>
                <button class="chip" type="button">时间分配需要优化</button>
              </div>
            </div>
            <div class="field">
              <label>课后任务</label>
              <div class="chips" data-field="homeworkTags">
                <button class="chip" type="button">背默本课重点词汇</button>
                <button class="chip" type="button">完成讲义错题订正</button>
                <button class="chip" type="button">整理语法易错点</button>
                <button class="chip" type="button">完成同类题巩固</button>
                <button class="chip" type="button">每天朗读 10 分钟</button>
                <button class="chip" type="button">作文按修改意见重写</button>
              </div>
            </div>
          </div>

          <div class="grid two">
            <div class="field">
              <label for="customNote">个性化补充</label>
              <textarea id="customNote" name="customNote" placeholder="可选：如今天默写进步明显，或某个题型仍需提醒"></textarea>
            </div>
            <div class="field">
              <label for="customHomework">具体作业页码</label>
              <textarea id="customHomework" name="customHomework" placeholder="可选：如完成讲义 P3-P5，订正试卷第 12、18、23 题"></textarea>
            </div>
          </div>

          <div class="actions">
            <button class="btn primary" id="generateBtn" type="button">生成反馈</button>
            <button class="btn" id="sampleBtn" type="button">填入示例</button>
          </div>
          <p class="small">重点内容已内置为勾选项，空白补充只用于写特别具体的学生表现或作业页码。</p>
        </div>
      </form>

      <section class="panel">
        <div class="panel-head">
          <h2>家长反馈</h2>
          <span class="count" id="wordCount">0 字</span>
        </div>
        <textarea class="result" id="result" placeholder="勾选左侧内容后，点击“生成反馈”。生成后仍可在这里直接微调。"></textarea>
        <div class="panel-body">
          <div class="actions">
            <button class="btn primary" id="copyBtn" type="button">复制反馈</button>
            <button class="btn" id="polishBtn" type="button">换一种说法</button>
          </div>
          <div class="notice" id="notice">已复制到剪贴板</div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const gradeNames = {
      g7: "初一",
      g8: "初二",
      g9: "初三"
    };

    const state = {
      template: "sync",
      variant: 0
    };

    const templateCopy = {
      sync: {
        label: "校内同步",
        focus: "校内同步知识梳理与课内重难点巩固",
        method: "结合课本知识点、典型例题和课堂练习进行讲解"
      },
      grammar: {
        label: "语法专项",
        focus: "语法专项梳理和题型训练",
        method: "先梳理结构和使用场景，再通过例句和题目训练落地"
      },
      reading: {
        label: "阅读专项",
        focus: "阅读理解方法训练",
        method: "围绕关键词定位、信息筛选和长难句理解进行训练"
      },
      exam: {
        label: "试卷讲评",
        focus: "试卷错题讲评和薄弱题型归因",
        method: "按错因分类讲解，并补充同类题帮助迁移"
      },
      writing: {
        label: "作文专项",
        focus: "作文审题、结构和表达升级",
        method: "从审题、段落展开、句式和连接词几个方面进行修改"
      }
    };

    const knowledge = {
      g7: {
        grammar: ["be 动词与人称代词", "一般现在时", "名词单复数", "可数与不可数名词", "物主代词", "指示代词 this/that/these/those", "there be 句型", "方位介词和时间介词", "频度副词", "情态动词 can/must", "祈使句", "特殊疑问句", "一般疑问句和否定句", "冠词 a/an/the"],
        vocabulary: ["Starter/Unit 高频词", "家庭与朋友话题词汇", "学校生活词汇", "课程与社团词汇", "食物与购物词汇", "时间日期表达", "数字序数词", "颜色服饰词汇", "日常活动短语", "音标与自然拼读", "开闭音节拼读", "单词拼写规则", "名词复数和第三人称单数词形", "基础固定搭配"],
        reading: ["细节题关键词定位", "图片和标题预测", "代词指代", "表格信息提取", "简单主旨概括", "人物关系判断", "时间地点线索", "段落顺序梳理", "基础完形上下文", "生活类短文理解", "信息匹配题", "句意还原入门"],
        writing: ["自我介绍", "介绍家人朋友", "校园生活短文", "饮食购物话题", "一日活动描述", "节日和生日邀请", "失物招领和通知", "看图写句", "句子大小写和标点", "主谓一致基础", "简单连接词 and/but/because", "三段式雏形"],
        listening: ["课堂指令理解", "数字时间听辨", "人物关系听辨", "日常问答反应", "地点场景判断", "价格日期听辨", "听前看题预测", "关键词捕捉", "短对话细节", "语音语调和重读"]

      document.querySelector("#learningStage").value = stageByPreset[name] || "steady";
      document.querySelector("#accuracy").value = name === "examSprint" || name === "readingSlow" ? "unstable" : "normal";
      document.querySelector("#homeSupport").value = name === "dictation" ? "dictation" : name === "habit" ? "independent" : name === "examSprint" ? "timing" : "review";
      document.querySelectorAll(".template").forEach(item => item.classList.toggle("active", item.dataset.template === state.template));
      renderKnowledge();
      setPressedByText([...currentSuggestion(), ...preset]);
    }

    function buildKnowledgeSummary(picked) {
      const parts = Object.entries(picked)
        .filter(([, items]) => items.length)
        .map(([group, items]) => `${groupNames[group]}部分主要是${joinItems(items)}`);
      return parts.length ? parts.join("；") : "本阶段校内同步知识点和课堂练习";
    }

    function buildAutoHomework(knowledgeItems, homeworkTags, grade, template) {
      const tasks = [...homeworkTags];
      if (knowledgeItems.some(item => /词|拼写|搭配|词汇/.test(item)) && !homeworkTags.join("").includes("词")) {
        tasks.push("背默本节重点词汇和短语");
      }
      if (knowledgeItems.some(item => /语|从句|时|态|代词|介词|非谓语|主谓/.test(item)) && !homeworkTags.join("").includes("语法")) {
        tasks.push("整理语法结构和典型错题");
      }
      if (knowledgeItems.some(item => /阅读|完形|长难句|主旨|推理|细节|七选五/.test(item))) {
        tasks.push(grade === "g9" ? "完成一组限时阅读训练" : "完成同类阅读题巩固");
      }
      if (knowledgeItems.some(item => /作文|写作|应用文|句式|审题/.test(item)) || template === "writing") {
        tasks.push("按课堂修改意见完善作文表达");
      }
      if (!tasks.length) tasks.push("完成课堂讲义订正，并复习今天勾画的重点");
      return [...new Set(tasks)];
    }

    function categorizeHomework(tasks, customHomework) {
      const all = [...tasks, customHomework].filter(Boolean);
      const category = {
        vocab: [],
        grammar: [],
        reading: [],
        writing: [],
        correction: [],
        habit: [],
        custom: []
      };

      all.forEach(task => {
        if (/词|背默|短语/.test(task)) category.vocab.push(task);
        else if (/语法|结构|易错点/.test(task)) category.grammar.push(task);
        else if (/阅读|同类题|限时/.test(task)) category.reading.push(task);
        else if (/作文|表达|重写/.test(task)) category.writing.push(task);
        else if (/错题|订正|讲义|试卷|P\d|p\d|页/.test(task)) category.correction.push(task);
        else if (/朗读|每天/.test(task)) category.habit.push(task);
        else category.custom.push(task);
      });

      if (category.reading.some(task => /同类阅读题/.test(task))) {
        category.reading = category.reading.filter(task => !/^完成同类题巩固$/.test(task));
      }

      Object.keys(category).forEach(key => {
        category[key] = [...new Set(category[key])];
      });

      return category;
    }

    function buildHomeworkAdvice(name, tasks, customHomework, style) {
      const grouped = categorizeHomework(tasks, customHomework);
      const parts = [];
      const prefix = style.closePrefix.includes("家里配合")
        ? `课后建议家里配合，帮助${name}`
        : `${style.closePrefix}${name}`;

      if (grouped.vocab.length) parts.push(`先完成${joinItems(grouped.vocab)}`);
      if (grouped.grammar.length) parts.push(`再整理${joinItems(grouped.grammar).replace(/^整理/, "")}`);
      if (grouped.reading.length) parts.push(`随后进行${joinItems(grouped.reading).replace(/^完成/, "")}`);
      if (grouped.writing.length) parts.push(`作文部分按要求${joinItems(grouped.writing).replace(/^作文/, "")}`);
      if (grouped.correction.length) parts.push(`最后落实${joinItems(grouped.correction)}`);
      if (grouped.habit.length) parts.push(`同时坚持${joinItems(grouped.habit)}`);
      if (grouped.custom.length) parts.push(joinItems(grouped.custom));

      if (!parts.length) {
        return `${prefix}先复习课堂笔记，再完成讲义订正，并把今天的错题重新梳理一遍。`;
      }

      return `${prefix}可以${parts.join("，")}。`;
    }

    function buildFeedback() {
      const data = new FormData(form);
      const name = normalizeName(data.get("student") || "");
      const grade = data.get("grade");
      const tone = toneWords[data.get("tone")] || toneWords.warm;
      const style = styleProfiles[data.get("style")] || styleProfiles.daily;
      const template = templateCopy[state.template];
      const variant = variants[state.variant % variants.length];
      const picked = selectedKnowledge();
      const knowledgeItems = flattenKnowledge(picked);
      const performance = selectedChips("performance");
      const mastery = selectedChips("mastery");
      const problems = selectedChips("problems");
      const homeworkTags = selectedChips("homeworkTags");
      const customNote = (data.get("customNote") || "").trim();
      const customHomework = (data.get("customHomework") || "").trim();
      const length = data.get("length");
      const learningStage = stageCopy[data.get("learningStage")];
      const accuracy = accuracyCopy[data.get("accuracy")];
      const homeSupport = supportCopy[data.get("homeSupport")];

      const knowledgeSummary = groupKnowledgeSummary(picked);
      const para1 = `${variant.hello(name)}${template.focus}。本节课${knowledgeSummary}，${style.focusEnd}${template.method}。`;

      const performanceBase = [
        `${variant.performance}${name}${tone.opening}`,
        `${style.transition}${name}今天的课堂状态整体可跟进`,
        `${variant.performance}${name}能够围绕课堂任务完成学习`
      ];
      const para2 = `${pick(performanceBase, 1)}${performance.length ? "，" + joinItems(performance) : ""}。${learningStage}${accuracy}` +
        (mastery.length
          ? `${variant.mastery}${name}${joinItems(mastery)}。`
          : `${variant.mastery}${name}能跟随课堂完成主要内容，但仍需要通过课后练习让知识点更加稳定。`);

      const problemSentences = [];
      if (problems.length) problemSentences.push(`${variant.problemLead}${joinItems(problems)}`);
      if (customNote) problemSentences.push(customNote);
      const para3 = problemSentences.length
        ? `${problemSentences.map(sentence).join("")}${tone.problem}`
        : `${name}今天没有特别突出的新问题，后续重点是保持复习节奏，减少同类错误反复出现。`;

      const autoHomework = buildAutoHomework(knowledgeItems, homeworkTags, grade, state.template);
      const para4 = `${buildHomeworkAdvice(name, autoHomework, customHomework, style)}${homeSupport}${tone.close}`;

      const compact = paragraphs => paragraphs
        .filter(Boolean)
        .join("\n")
        .replace(/\n{2,}/g, "\n")
        .replace(/：。/g, "。")
        .replace(/，。/g, "。");

      if (length === "short") {
        return data.get("style") === "brief"
          ? compact([para1, para2, para4])
          : compact([para1, para2, para3, para4]);
      }

      if (length === "long") {
        const gradeTip = grade === "g9"
          ? "初三阶段建议继续加强限时训练和错因归类，尤其要把词汇、语法和阅读方法放到中考题型中反复运用。"
          : grade === "g8"
            ? "初二知识开始明显承上启下，建议把语法结构、词形变化和阅读方法同步整理，避免后期综合题失分。"
            : "初一阶段建议优先把词汇拼写、句子结构和朗读习惯打扎实，为后续语法和阅读学习打基础。";
        return compact([para1, para2, para3, `${para4}${gradeTip}`]);
      }

      return compact([para1, para2, para3, para4]);
    }

    function updateCounts() {
      const selected = document.querySelectorAll('.chip[aria-pressed="true"]').length;
      const textFilled = ["student", "customNote", "customHomework"].filter(id => document.querySelector(`#${id}`).value.trim()).length;
      filledCount.textContent = `${selected + textFilled} 项已选择`;
      wordCount.textContent = `${result.value.replace(/\s/g, "").length} 字`;
    }

    function generate() {
      result.value = buildFeedback();
      updateCounts();
      result.focus();
    }

    function bindStaticChips() {
      document.querySelectorAll(".chip:not([data-knowledge]):not([data-preset])").forEach(button => {
        button.setAttribute("aria-pressed", "false");
        button.addEventListener("click", () => {
          button.setAttribute("aria-pressed", button.getAttribute("aria-pressed") !== "true");
          updateCounts();
        });
      });
    }

    document.querySelectorAll(".template").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".template").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        state.template = button.dataset.template;
        renderKnowledge();
      });
    });

    document.querySelector("#grade").addEventListener("change", renderKnowledge);
    document.querySelector("#generateBtn").addEventListener("click", generate);
    document.querySelector("#generateTopBtn").addEventListener("click", generate);

    document.querySelector("#polishBtn").addEventListener("click", () => {
      state.variant += 1;
      generate();
    });

    document.querySelector("#clearKnowledgeBtn").addEventListener("click", () => {
      document.querySelectorAll("[data-knowledge]").forEach(button => button.setAttribute("aria-pressed", "false"));
      updateCounts();
    });

    document.querySelector("#suggestBtn").addEventListener("click", () => {
      setPressedByText(currentSuggestion());
    });

    document.querySelectorAll("[data-preset]").forEach(button => {
      button.setAttribute("aria-pressed", "false");
      button.addEventListener("click", () => {
        button.setAttribute("aria-pressed", button.getAttribute("aria-pressed") !== "true");
        applyPreset(button.dataset.preset);
      });
    });

    document.querySelector("#copyBtn").addEventListener("click", async () => {
      if (!result.value.trim()) generate();
      try {
        await navigator.clipboard.writeText(result.value);
      } catch (error) {
        result.select();
        document.execCommand("copy");
      }
      notice.classList.add("show");
      setTimeout(() => notice.classList.remove("show"), 1800);
    });

    document.querySelector("#sampleBtn").addEventListener("click", () => {
      form.reset();
      document.querySelector("#student").value = "王";
      document.querySelector("#grade").value = "g8";
      document.querySelector("#tone").value = "warm";
      document.querySelector("#style").value = "problem";
      document.querySelector("#learningStage").value = "steady";
      document.querySelector("#accuracy").value = "unstable";
      document.querySelector("#homeSupport").value = "review";
      document.querySelector("#length").value = "medium";
      document.querySelectorAll(".template").forEach(item => item.classList.toggle("active", item.dataset.template === "grammar"));
      state.template = "grammar";
      renderKnowledge();
      setPressedByText([
        "现在完成时", "动词过去式和过去分词", "长难句拆分", "建议类作文",
        "听课认真", "能主动回答问题", "基础概念已理解", "细节运用还需巩固",
        "语法概念易混淆", "阅读定位偏慢", "背默本课重点词汇", "完成同类题巩固"
      ]);
      document.querySelector("#customNote").value = "今天在 have/has done 的选择上还会犹豫，阅读题需要更快抓住关键词。";
      document.querySelector("#customHomework").value = "完成讲义 P3-P5，并订正今天标星的 4 道错题";
      generate();
    });

    document.querySelector("#resetBtn").addEventListener("click", () => {
      form.reset();
      result.value = "";
      state.template = "sync";
      state.variant = 0;
      document.querySelectorAll(".template").forEach(item => item.classList.toggle("active", item.dataset.template === "sync"));
      renderKnowledge();
      document.querySelectorAll(".chip").forEach(button => button.setAttribute("aria-pressed", "false"));
      updateCounts();
    });

    form.addEventListener("input", updateCounts);
    result.addEventListener("input", updateCounts);
    bindStaticChips();
    renderKnowledge();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js?v=2").catch(() => {});
      });
    }
  </script>
</body>
</html>
